name: AI Blog Factory

on:
 schedule:

   - cron: '0 6 * * *'
   - cron: '0 8 * * *'
   - cron: '0 9 * * *'
   - cron: '0 13 * * *'
   - cron: '0 14 * * *'
   - cron: '0 16 * * *'
   - cron: '0 19 * * *'

jobs:
 run:

   runs-on: ubuntu-latest

   steps:

   - uses: actions/checkout@v4

   - name: Install python
     uses: actions/setup-python@v4
     with:
       python-version: '3.11'

   - run: pip install -r requirements.txt

   - run: python main.py